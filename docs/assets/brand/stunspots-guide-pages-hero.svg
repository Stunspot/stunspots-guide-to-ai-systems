<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" role="img" aria-labelledby="title desc">
  <title id="title">Stunspot’s Guide to AI Systems</title>
  <desc id="desc">The AI Engineering Systems Canon — a comprehensive field manual for practical AI systems design, RAG substrate, project knowledge, and agent doctrine.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#02070c"/>
      <stop offset="0.48" stop-color="#061b2b"/>
      <stop offset="1" stop-color="#02070c"/>
    </linearGradient>
    <radialGradient id="glow" cx="68%" cy="24%" r="58%">
      <stop offset="0" stop-color="#48cbe8" stop-opacity="0.28"/>
      <stop offset="0.42" stop-color="#48cbe8" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#48cbe8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0v54" fill="none" stroke="#48cbe8" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .kicker { font: 700 34px Inter, Poppins, Montserrat, Arial, sans-serif; letter-spacing: 0.24em; fill: #48cbe8; }
      .title { font: 900 106px Inter, Poppins, Montserrat, Arial, sans-serif; letter-spacing: 0.02em; fill: #fafafa; }
      .subtitle { font: 500 38px Inter, Poppins, Montserrat, Arial, sans-serif; fill: #ccdce4; }
      .micro { font: 700 25px Inter, Poppins, Montserrat, Arial, sans-serif; letter-spacing: 0.08em; fill: #8eeaff; }
      .tag { font: 700 24px Inter, Poppins, Montserrat, Arial, sans-serif; fill: #fafafa; }
      .thin { fill: none; stroke: #48cbe8; stroke-width: 3; stroke-opacity: 0.82; }
      .thin-soft { fill: none; stroke: #48cbe8; stroke-width: 2; stroke-opacity: 0.28; }
      .verm { fill: #ff5a2f; }
    </style>
  </defs>

  <rect width="1600" height="800" fill="url(#bg)"/>
  <rect width="1600" height="800" fill="url(#glow)"/>
  <rect width="1600" height="800" fill="url(#grid)"/>

  <g opacity="0.96">
    <rect x="72" y="70" width="1456" height="660" rx="38" class="thin"/>
    <rect x="104" y="102" width="1392" height="596" rx="26" class="thin-soft"/>
    <path d="M103 190H1497" class="thin-soft"/>
    <path d="M103 610H1497" class="thin-soft"/>
  </g>

  <g transform="translate(126 137)">
    <text class="kicker" x="0" y="0">STUNSPOT’S GUIDE TO</text>
    <text class="title" x="0" y="124">AI SYSTEMS</text>
    <text class="subtitle" x="4" y="188">The AI Engineering Systems Canon</text>
  </g>

  <g transform="translate(1120 154)" filter="url(#softGlow)">
    <circle cx="132" cy="132" r="94" fill="none" stroke="#48cbe8" stroke-width="5" opacity="0.84"/>
    <circle cx="132" cy="132" r="48" fill="none" stroke="#48cbe8" stroke-width="4" opacity="0.72"/>
    <circle cx="132" cy="132" r="10" fill="#ff5a2f"/>
    <path d="M132 38v188M38 132h188M66 66l132 132M198 66L66 198" stroke="#48cbe8" stroke-width="3" opacity="0.54"/>
    <path d="M132 38C220 54 234 114 226 132C220 198 170 226 132 226C66 218 38 170 38 132C46 74 86 46 132 38Z" fill="none" stroke="#ff5a2f" stroke-width="3" opacity="0.82"/>
  </g>

  <g transform="translate(130 500)">
    <rect x="0" y="0" width="304" height="70" rx="16" fill="rgba(72,203,232,0.10)" stroke="#48cbe8" stroke-opacity="0.55"/>
    <text class="micro" x="30" y="44">RAG SUBSTRATE</text>

    <rect x="336" y="0" width="328" height="70" rx="16" fill="rgba(72,203,232,0.10)" stroke="#48cbe8" stroke-opacity="0.55"/>
    <text class="micro" x="366" y="44">PROJECT KNOWLEDGE</text>

    <rect x="696" y="0" width="280" height="70" rx="16" fill="rgba(72,203,232,0.10)" stroke="#48cbe8" stroke-opacity="0.55"/>
    <text class="micro" x="726" y="44">AGENT DOCTRINE</text>
  </g>

  <g transform="translate(130 645)">
    <circle cx="12" cy="-8" r="7" class="verm"/>
    <text class="tag" x="34" y="0">37 reports · 12 volumes · model steering · context architecture · RAG · agents · evals · governance</text>
  </g>
</svg>
